name: flagcicd-Hopper-Build-And-Test

on:
  schedule:
    - cron: '0 21 * * *'
  pull_request:
    branches: [ "triton_v3.4.x", "triton_v3.5.x", "triton_v3.6.x", "triton_v3.6.x_test_base_branch"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flagcicd-hopper-build-and-test:
    runs-on: [flagcicd-flagtree-nvidia3.6]
    container:
      image: harbor.baai.ac.cn/flagtree/flagtree-3.6.x-py312-torch2.8.0a0_5228986c39.nv25.05-ubuntu24.04:202603
      options: 
        --uts=host
        --ipc=host
        --privileged
        --ulimit stack=67108864
        --ulimit memlock=-1
        --security-opt seccomp=unconfined
        --gpus=all
      volumes:
        - /mnt/airs-business/cicd:/mnt/airs-business/cicd
        - /home/secure/flagcicd-flagGems-test:/home/secure/flagcicd-flagGems-test

    # '>' symbol folding multiple lines of text into a single line (newline characters will be replaced with spaces)
    #  If the push event is triggered by a pull request merge commit, skip this workflow run.
    if: >
      (github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree') &&
      !(
        github.event_name == 'push' && 
        (
          startsWith(github.event.head_commit.message, 'Merge pull request') || 
          contains(github.event.head_commit.message, '(#') ||
          github.event.head_commit.committer.email == 'noreply@github.com'
        )
      )
    steps:
      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Set safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: nvidia

      - name: Detect Target Branch
        shell: bash
        run: |
          set -x
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$TARGET_BRANCH"


      - name: FlagTree Build on NVidia (triton_v3.6.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.6.x_test_base_branch' }}
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          env | grep -E '^(LLVM_SYSPATH)=' >> $GITHUB_ENV || true
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagGems Accuracy Test on NVidia
        # if: ${{ steps.check_backend.outputs.should_skip != 'true' }}
        shell: bash
        run: |
          set -x
          FLAGGEMS_BASE="${GITHUB_WORKSPACE}/../nvidia"
          FLAGGEMS_DIR="${FLAGGEMS_BASE}/FlagGems"
          CONFIG_DIR="${FLAGGEMS_BASE}/config"
          SCRIPTS_DIR="${FLAGGEMS_BASE}/../scripts"
          IGNORE_LIST="${CONFIG_DIR}/ignore_list.txt"
          OPERATORS_YAML="${FLAGGEMS_DIR}/conf/operators.yaml"

          echo "${FLAGGEMS_BASE}"   "${CONFIG_DIR}" "${SCRIPTS_DIR}" 
          mkdir -p "${FLAGGEMS_BASE}" "${CONFIG_DIR}" "${SCRIPTS_DIR}"

          cd "${FLAGGEMS_BASE}"
          rm -rf ./FlagGems
          git clone https://github.com/flagos-ai/FlagGems.git

          cd "${SCRIPTS_DIR}"
          touch parse_operators.py 
          cat << 'EOF' > parse_operators.py
          #!/usr/bin/env python3
          """
          解析 FlagGems/conf/operators.yaml 文件，提取算子名称并生成 pytest -m 参数
          """

          import yaml
          import sys
          from pathlib import Path

          def parse_operators(yaml_file: str) -> list:
              """
              解析 operators.yaml 文件，提取所有算子名称
            
              Args:
                  yaml_file: operators.yaml 文件路径
            
              Returns:
                  算子名称列表
              """
              with open(yaml_file, 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)

              operators = []
              if 'ops' in data:
                  for op in data['ops']:
                      if 'id' in op:
                          operators.append(op['id'])

              return operators

          def generate_pytest_marks(operators: list) -> str:
              """
              将算子列表转换为 pytest -m 参数格式
            
              Args:
                  operators: 算子名称列表
            
              Returns:
                  pytest -m 参数字符串，格式为 "op1 or op2 or op3"
              """
              if not operators:
                  raise ValueError("算子列表为空")

              return " or ".join(operators)

          def main():
              if len(sys.argv) != 2:
                  print(f"用法: {sys.argv[0]} <operators.yaml 路径>", file=sys.stderr)
                  sys.exit(1)

              yaml_file = sys.argv[1]

              if not Path(yaml_file).exists():
                  print(f"错误: 文件不存在: {yaml_file}", file=sys.stderr)
                  sys.exit(1)

              try:
                  operators = parse_operators(yaml_file)
                  marks = generate_pytest_marks(operators)
                  print(marks)
              except Exception as e:
                  print(f"错误: {e}", file=sys.stderr)
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          EOF
          chmod +x parse_operators.py 
          cat parse_operators.py

          if [ ! -d "$FLAGGEMS_DIR" ]; then
            echo "Error: FlagGems directory not found at $FLAGGEMS_DIR"
            echo "Please clone FlagGems repository to the shared storage first."
            exit 1
          fi

          # 检查 operators.yaml 是否存在
          if [ ! -f "$OPERATORS_YAML" ]; then
            echo "Error: operators.yaml not found at $OPERATORS_YAML"
            exit 1
          fi

          # 安装 FlagGems 依赖
          cd "$FLAGGEMS_DIR"
          pip install -r requirements/requirements_nvidia.txt
          pip list
          pip install -v -e .  --no-build-isolation
          if [ $? -ne 0 ]; then
              echo "Error: Failed to install FlagGems"
              exit 1
          fi

          # pip install --no-cache-dir pyyaml==6.0.2
          # 生成 pytest marks 参数
          MARKS=$(python3  "${SCRIPTS_DIR}/parse_operators.py"  "$OPERATORS_YAML")
          if [ -z "$MARKS" ]; then
            echo "Error: Failed to generate pytest marks"
            exit 1
          fi
          # 打印 MARKS 字符串的前 200 个字符
          echo "Generated pytest marks: ${MARKS:0:200}..."

          # 构建 pytest 命令
          PYTEST_CMD="python3 -m pytest tests/ -m \"$MARKS\" --ref=cpu --quick -v"
          # PYTEST_CMD="python3 -m pytest tests/ -m \"$MARKS\" --ref=cpu -v"

          # 添加 ignore 参数
          if [ -f "$IGNORE_LIST" ]; then       # 如果有忽略列表文件就读取它
            while IFS= read -r line || [[ -n "$line" ]]; do   # 成功读取一行的数据或者最后一行没有以换行符结尾
              # 跳过空行和注释
              line=$(echo "$line" | tr -d '[:space:]')  
              [[ -z "$line" ]] && continue    # 如果是空行则跳过，进入下一轮循环
              [[ "$line" == \#* ]] && continue   # 如果是以#开头的注释行，进入下一轮循环
              PYTEST_CMD="$PYTEST_CMD --ignore=${FLAGGEMS_DIR}/tests/${line}"
            done < "$IGNORE_LIST"
          fi


          # 设置超时时间 (55分钟 = 3300秒)
          # TIMEOUT=3600

          echo "=========================================="
          echo "Running FlagGems accuracy tests"
          # echo "Timeout: ${TIMEOUT}s (~60min)"
          echo "Quick mode: enabled"
          echo "Reference device: cpu"
          echo "=========================================="

          # # 运行测试 (带超时)
          # cd "$FLAGGEMS_DIR"
          # # 如果command 执行失败，就执行后面的代码块
          # timeout $TIMEOUT bash -c "$PYTEST_CMD" || {
          #   EXIT_CODE=$?
          #   if [ $EXIT_CODE -eq 124 ]; then   # timeout 命令的特殊退出码124，如果超时则到这里结束
          #     echo "Warning: Tests timed after ${TIMEOUT}s"
          #     # 超时不算失败
          #     exit 0
          #   else      # 如果pytest命令执行失败
          #     echo "Warning: Some tests failed with exit code $EXIT_CODE"
          #     # 测试失败也不阻塞 CI，只发出警告
          #     exit 0
          #   fi
          # }

          # 运行测试 (不带超时)
          cd "$FLAGGEMS_DIR"
          bash -c "$PYTEST_CMD"
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
              echo "All tests passed"
              echo "FlagGems accuracy tests completed successfully"
              exit 0
          elif [ $EXIT_CODE -eq 5 ]; then
              echo "Error: No tests were collected. Configuration issue suspected."
              # 可能是配置错误，应该报错
              exit 1
          elif [ $EXIT_CODE -eq 1 ]; then
              echo "Warning: Some tests failed, tests exited with code $EXIT_CODE"
              echo "FlagGems accuracy tests completed successfully (failures allowed)"
              exit 0  # 测试失败不阻塞 CI
          else
              echo "Error: Tests exited with code $EXIT_CODE"
              exit 1
          fi