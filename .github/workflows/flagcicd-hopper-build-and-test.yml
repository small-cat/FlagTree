name: flagcicd-Hopper-Build-And-Test

on:
  schedule:
    - cron: '0 21 * * *'
  pull_request:
    branches: [ "triton_v3.4.x", "triton_v3.5.x", "triton_v3.6.x", "triton_v3.6.x_test_base_branch"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flagcicd-hopper-build-and-test:
    runs-on: [flagcicd-flagtree-nvidia3.6]
    container:
      image: harbor.baai.ac.cn/flagtree/flagtree-3.6.x-py312-torch2.8.0a0_5228986c39.nv25.05-ubuntu24.04:202603
      options: 
        --uts=host
        --ipc=host
        --privileged
        --ulimit stack=67108864
        --ulimit memlock=-1
        --security-opt seccomp=unconfined
        --gpus=all
      volumes:
        - /mnt/airs-business/cicd:/mnt/airs-business/cicd
        - /home/secure/flagcicd-flagGems-test:/home/secure/flagcicd-flagGems-test

    if: ${{ github.repository == 'FlagTree/flagtree' || github.repository == 'flagos-ai/flagtree' }}
    steps:
      - name: Smart Checkout
        uses: flagos-ai/FlagTree/.github/actions/smart-checkout@main
        with:
          checkout_version: 'v6'

      - name: Set safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Check if backend-relevant files changed
        id: check_backend
        uses: flagos-ai/FlagTree/.github/actions/check-backend-changed@main
        with:
          backend: nvidia

      - name: Detect Target Branch
        shell: bash
        run: |
          set -x
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.base_ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "TARGET_BRANCH=$TARGET_BRANCH"

      - name: FlagTree Build on NVidia (triton_v3.4.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.4.x' }}
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          source ~/env-3.4.sh
          env | grep -E '^(LLVM_SYSPATH)=' >> $GITHUB_ENV || true
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagTree Build on NVidia (triton_v3.5.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.5.x' }}
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          source ~/env-3.5.sh
          env | grep -E '^(LLVM_SYSPATH)=' >> $GITHUB_ENV || true
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagTree Build on NVidia (triton_v3.6.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.6.x_test_base_branch' }}
        shell: bash
        run: |
          set -x
          pip uninstall -y triton
          env | grep -E '^(LLVM_SYSPATH)=' >> $GITHUB_ENV || true
          MAX_JOBS=32 python3 -m pip install . --no-build-isolation

      - name: FlagTree Test on NVidia (triton_v3.4.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.4.x' }}
        shell: bash
        run: |
          set -x
          # python unit test
          python3 -m pytest -s python/test/unit/cuda
          python3 -m pytest -s python/test/unit/instrumentation
          python3 -m pytest -s python/test/unit/language \
              --ignore=python/test/unit/language/test_line_info.py
          python3 -m pytest -s python/test/unit/runtime
          if [ -d "python/test/operators" ]; then
            python3 -m pytest -s python/test/operators
          fi

      - name: FlagTree Test on NVidia (triton_v3.5.x branch)
        if: ${{ steps.check_backend.outputs.should_skip != 'true' && env.TARGET_BRANCH == 'triton_v3.5.x' }}
        shell: bash
        run: |
          set -x
          source ~/env.sh
          # python tutorials
          python3 python/tutorials/01-vector-add.py --only_unit_test
          python3 python/tutorials/02-fused-softmax.py --only_unit_test
          python3 python/tutorials/03-matrix-multiplication.py --only_unit_test
          python3 python/tutorials/04-low-memory-dropout.py --only_unit_test
          python3 python/tutorials/05-layer-norm.py --only_unit_test
          python3 python/tutorials/06-fused-attention.py --only_unit_test
          python3 python/tutorials/07-extern-functions.py --only_unit_test
          python3 python/tutorials/08-grouped-gemm.py --only_unit_test
          python3 python/tutorials/09-persistent-matmul.py --only_unit_test
          python3 python/tutorials/11-programmatic-dependent-launch.py --only_unit_test
          # python unit test
          python3 -m pytest -s python/test/unit/cuda
          python3 -m pytest -s python/test/unit/instrumentation
          python3 -m pytest -s python/test/unit/language \
              --ignore=python/test/unit/language/test_line_info.py
          python3 -m pytest -s python/test/unit/runtime
          if [ -d "python/test/operators" ]; then
            python3 -m pytest -s python/test/operators
          fi
          # flagtree tle
          # python tutorials
          python3 python/tutorials/tle/01-fft.py
          python3 python/tutorials/tle/02-moe_align_block_size.py
          python3 python/tutorials/tle/03-topk.py
          python3 python/tutorials/tle/04-cluster-gemm.py
          python3 python/tutorials/tle/deepseek_v32/01-topk_selector.py
          python3 python/tutorials/tle/deepseek_v32/02-sparse-mla.py --mode test
          python3 python/tutorials/tle/deepseek_v32/02-sparse-mla.py
          # python unit test
          python3 -m pytest -s python/test/tle/integration
          python3 -m pytest -s python/test/tle/unit
          # flagtree hints
          # python tutorials
          python3 python/tutorials/hints/01/01-vector-add.py --only_unit_test
          # python3 python/tutorials/hints/02/02-fused-softmax.py --only_unit_test
          python3 python/tutorials/hints/03/03-matrix-multiplication.py --only_unit_test
          python3 python/tutorials/hints/04/04-low-memory-dropout.py --only_unit_test
          python3 python/tutorials/hints/05/05-layer-norm.py --only_unit_test
          python3 python/tutorials/hints/06/06-fused-attention.py --only_unit_test
          python3 python/tutorials/hints/07/07-extern-functions.py --only_unit_test
          python3 python/tutorials/hints/08/08-grouped-gemm.py --only_unit_test
          python3 python/tutorials/hints/11/11-programmatic-dependent-launch.py --only_unit_test
          # flagtree tle raw
          python3 python/tutorials/tle/raw/mlir/01-vector-add.py
          python3 python/tutorials/tle/raw/mlir/02-fused-softmax.py
          python3 python/tutorials/tle/raw/mlir/03-matrix-multiplication.py
          python3 python/tutorials/tle/raw/mlir/04-hello-world.py
          python3 python/tutorials/tle/raw/mlir/05-topk.py --kernel triton
          python3 python/tutorials/tle/raw/mlir/05-topk.py --kernel tle
          python3 python/tutorials/tle/raw/mlir/06-test-vassert.py

      - name: FlagGems Accuracy Test on NVidia
        # if: ${{ steps.check_backend.outputs.should_skip != 'true' }}
        shell: bash
        run: |
          set -x
          # 定义路径
          FLAGGEMS_BASE="/home/secure/flagcicd-flagGems-test/nvidia"
          FLAGGEMS_DIR="${FLAGGEMS_BASE}/FlagGems"
          CONFIG_DIR="${FLAGGEMS_BASE}/config"
          SCRIPTS_DIR="/home/secure/flagcicd-flagGems-test/scripts"
          IGNORE_LIST="${CONFIG_DIR}/ignore_list.txt"
          OPERATORS_YAML="${FLAGGEMS_DIR}/conf/operators.yaml"

          # 检查 FlagGems 目录是否存在
          if [ ! -d "$FLAGGEMS_DIR" ]; then
            echo "Error: FlagGems directory not found at $FLAGGEMS_DIR"
            echo "Please clone FlagGems repository to the shared storage first."
            exit 1
          fi

          # 检查 operators.yaml 是否存在
          if [ ! -f "$OPERATORS_YAML" ]; then
            echo "Error: operators.yaml not found at $OPERATORS_YAML"
            exit 1
          fi

          # 安装 FlagGems 依赖
          cd "$FLAGGEMS_DIR"
          pip install -e . --no-build-isolation 2>/dev/null || true

          pip install --no-cache-dir pyyaml==6.0.2
          # 生成 pytest marks 参数
          MARKS=$(python3  "${SCRIPTS_DIR}/parse_operators.py"  "$OPERATORS_YAML")
          if [ -z "$MARKS" ]; then
            echo "Error: Failed to generate pytest marks"
            exit 1
          fi
          # 打印 MARKS 字符串的前 200 个字符
          echo "Generated pytest marks: ${MARKS:0:200}..."

          # 构建 pytest 命令
          PYTEST_CMD="python3 -m pytest tests/ -m \"$MARKS\" --ref=cpu --quick -v"
          # PYTEST_CMD="python3 -m pytest tests/ -m \"$MARKS\" --ref=cpu -v"

          # 添加 ignore 参数
          if [ -f "$IGNORE_LIST" ]; then       # 如果有忽略列表文件就读取它
            while IFS= read -r line || [[ -n "$line" ]]; do   # 成功读取一行的数据或者最后一行没有以换行符结尾
              # 跳过空行和注释
              line=$(echo "$line" | tr -d '[:space:]')  
              [[ -z "$line" ]] && continue    # 如果是空行则跳过，进入下一轮循环
              [[ "$line" == \#* ]] && continue   # 如果是以#开头的注释行，进入下一轮循环
              PYTEST_CMD="$PYTEST_CMD --ignore=${FLAGGEMS_DIR}/tests/${line}"
            done < "$IGNORE_LIST"
          fi


          # 设置超时时间 (55分钟 = 3300秒)
          # TIMEOUT=3600

          echo "=========================================="
          echo "Running FlagGems accuracy tests"
          # echo "Timeout: ${TIMEOUT}s (~60min)"
          echo "Quick mode: enabled"
          echo "Reference device: cpu"
          echo "=========================================="

          # # 运行测试 (带超时)
          # cd "$FLAGGEMS_DIR"
          # # 如果command 执行失败，就执行后面的代码块
          # timeout $TIMEOUT bash -c "$PYTEST_CMD" || {
          #   EXIT_CODE=$?
          #   if [ $EXIT_CODE -eq 124 ]; then   # timeout 命令的特殊退出码124，如果超时则到这里结束
          #     echo "Warning: Tests timed after ${TIMEOUT}s"
          #     # 超时不算失败
          #     exit 0
          #   else      # 如果pytest命令执行失败
          #     echo "Warning: Some tests failed with exit code $EXIT_CODE"
          #     # 测试失败也不阻塞 CI，只发出警告
          #     exit 0
          #   fi
          # }

          # 运行测试 (不带超时)
          cd "$FLAGGEMS_DIR"
          # 如果 command 执行失败，就执行后面的代码块
          bash -c "$PYTEST_CMD" || {
            EXIT_CODE=$?
            echo "Warning: Some tests failed with exit code $EXIT_CODE"
            # 测试失败也不阻塞 CI，只发出警告
            exit 0
          }


          echo "FlagGems accuracy tests completed successfully"
